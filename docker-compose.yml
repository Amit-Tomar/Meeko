version: '3.8'

services:
  home-assistant:
    container_name: home-assistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./volumes/home-assistant:/config
    ports:
      - "8123:8123"
    restart: unless-stopped
    privileged: true
    environment:
      - TZ=UTC

  wyoming-whisper:
    container_name: wyoming-whisper
    image: rhasspy/wyoming-whisper:latest
    volumes:
      - ./volumes/wyoming-whisper:/data
    ports:
      - "10300:10300"
    restart: unless-stopped
    command: --model base --language en --data-dir /data
    environment:
      - TZ=UTC

  wyoming-piper:
    container_name: wyoming-piper
    image: rhasspy/wyoming-piper:latest
    volumes:
      - ./volumes/wyoming-piper:/data
    ports:
      - "10200:10200"
    restart: unless-stopped
    command: --voice en_US-lessac-medium --data-dir /data
    environment:
      - TZ=UTC

  wyoming-openwakeword:
    container_name: wyoming-openwakeword
    image: rhasspy/wyoming-openwakeword:latest
    volumes:
      - ./volumes/wyoming-openwakeword:/data
      - ./volumes/wyoming-openwakeword/custom:/custom
    ports:
      - "10400:10400"
    restart: unless-stopped
    command: --preload-model ok_nabu --custom-model-dir /custom
    environment:
      - TZ=UTC

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ./volumes/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      - TZ=UTC
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

